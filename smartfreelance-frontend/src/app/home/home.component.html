<!-- Navbar -->
<nav style="display:flex; justify-content:space-between; align-items:center; 
            background:#212529; padding:12px 24px;">
  <span style="color:white; font-weight:700; font-size:1.2rem;">FreelanceHub</span>
  <div style="display:flex; gap:10px;">
    <button (click)="goTo('/login')"
      style="background:transparent; color:white; border:1px solid white; 
             padding:7px 18px; border-radius:6px; cursor:pointer; font-size:0.9rem;">
      Sign In
    </button>
    <button (click)="goTo('/utilisateur')"
      style="background:#198754; color:white; border:none; 
             padding:7px 18px; border-radius:6px; cursor:pointer; font-size:0.9rem;">
      Sign Up
    </button>
  </div>
</nav>

<!-- Hero -->
<section style="background:#212529; color:white; text-align:center; padding:60px 20px;">
  <h1 style="font-size:2.8rem; font-weight:700;">Find the perfect Freelancer</h1>
  <p style="font-size:1.1rem; color:#adb5bd; margin-top:10px;">Work with the best talent worldwide</p>
  <button style="background:#198754; color:white; border:none; padding:12px 30px; 
                 border-radius:8px; font-size:1rem; cursor:pointer; margin-top:20px;">
    Get Started
  </button>
</section>

<!-- Freelancers -->
<div style="padding:40px 60px;">
  <h2 style="margin-bottom:30px;">Top Freelancers</h2>
  <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:24px;">
    <div *ngFor="let freelancer of freelancers"
      style="border:1px solid #dee2e6; border-radius:12px; padding:24px; 
             box-shadow:0 2px 8px rgba(0,0,0,0.08);">
      <h5 style="font-weight:700;">{{freelancer.name}}</h5>
      <p style="color:#6c757d;">{{freelancer.skill}}</p>
      <span style="background:#198754; color:white; padding:4px 12px; 
                   border-radius:20px; font-size:0.85rem;">
        {{freelancer.price}} $/h
      </span>
      <button style="display:block; width:100%; margin-top:16px; padding:10px;
                     border:1px solid #198754; color:#198754; background:transparent;
                     border-radius:8px; cursor:pointer; font-size:0.9rem;">
        Hire
      </button>
    </div>
  </div>
</div>
