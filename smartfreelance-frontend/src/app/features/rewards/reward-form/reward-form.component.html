<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- Error -->
<div class="form-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Form Card -->
<div class="form-container" *ngIf="!loading">
  <div class="form-card">

    <div class="form-card-header">
      <div class="form-title-wrapper">
        <span class="form-badge">{{ isEditMode ? 'Edit' : 'New' }}</span>
        <h2 class="form-title">{{ isEditMode ? 'Edit Reward' : 'Add a Reward' }}</h2>
      </div>
    </div>

    <div class="form-card-body">
      <form (ngSubmit)="onSubmit()" #rewardForm="ngForm">

        <!-- Formation ID readonly -->
        <div class="field-group" *ngIf="formationId">
          <label class="field-label">
            <span class="field-icon">📚</span> Linked Formation
          </label>
          <input
            type="text"
            class="field-input"
            [value]="'Formation #' + formationId"
            readonly
            disabled
          />
        </div>

        <!-- Name -->
        <div class="field-group">
          <label for="name" class="field-label">
            <span class="field-icon">🏅</span> Name <span class="required">*</span>
          </label>
          <input
            type="text"
            class="field-input"
            id="name"
            name="name"
            placeholder="Enter reward name..."
            [(ngModel)]="reward.name"
            required
            #rname="ngModel"
            [class.input-error]="rname.invalid && rname.touched"
          />
          <div class="field-error" *ngIf="rname.invalid && rname.touched">
            ⚠ Name is required.
          </div>
        </div>

        <!-- Type -->
        <div class="field-group">
          <label for="type" class="field-label">
            <span class="field-icon">🎖️</span> Type <span class="required">*</span>
          </label>
          <select
            class="field-input"
            id="type"
            name="type"
            [(ngModel)]="reward.type"
            required
            #rtype="ngModel"
            [class.input-error]="rtype.invalid && rtype.touched"
          >
            <option value="" disabled>Select a type...</option>
            <option *ngFor="let t of rewardTypes" [value]="t">{{ t }}</option>
          </select>
          <div class="field-error" *ngIf="rtype.invalid && rtype.touched">
            ⚠ Type is required.
          </div>
        </div>

        <!-- Level -->
        <div class="field-group">
          <label for="level" class="field-label">
            <span class="field-icon">⭐</span> Level <span class="required">*</span>
          </label>
          <select
            class="field-input"
            id="level"
            name="level"
            [(ngModel)]="reward.level"
            required
            #rlevel="ngModel"
            [class.input-error]="rlevel.invalid && rlevel.touched"
          >
            <option value="" disabled>Select a level...</option>
            <option *ngFor="let l of rewardLevels" [value]="l">{{ l }}</option>
          </select>
          <div class="field-error" *ngIf="rlevel.invalid && rlevel.touched">
            ⚠ Level is required.
          </div>
        </div>

        <!-- Min Score Required -->
        <div class="field-group">
          <label for="minScoreRequired" class="field-label">
            <span class="field-icon">🎯</span> Min Score Required (%) <span class="required">*</span>
          </label>
          <div class="input-prefix-wrapper">
            <span class="input-prefix">%</span>
            <input
              type="number"
              class="field-input with-prefix"
              id="minScoreRequired"
              name="minScoreRequired"
              placeholder="Ex: 75"
              [(ngModel)]="reward.minScoreRequired"
              required
              min="0"
              max="100"
              #rminScore="ngModel"
              [class.input-error]="rminScore.invalid && rminScore.touched"
            />
          </div>
          <div class="field-error" *ngIf="rminScore.invalid && rminScore.touched">
            ⚠ Min score is required (0–100).
          </div>
        </div>

        <!-- Icon URL (optional) -->
        <div class="field-group">
          <label for="iconUrl" class="field-label">
            <span class="field-icon">🖼️</span> Icon URL <span class="optional">(optional)</span>
          </label>
          <input
            type="text"
            class="field-input"
            id="iconUrl"
            name="iconUrl"
            placeholder="https://example.com/icon.png"
            [(ngModel)]="reward.iconUrl"
          />
        </div>

        <!-- Hidden formation -->
        <input type="hidden" name="formation" [ngModel]="formationId" />

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="cancel()">← Cancel</button>
          <button type="submit" class="btn btn-submit" [disabled]="rewardForm.invalid">
            {{ isEditMode ? '✏️ Update' : '✚ Create Reward' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
