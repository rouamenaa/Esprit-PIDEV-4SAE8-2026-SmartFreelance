<!-- Loading -->
<div class="loading-container" *ngIf="loading">
  <div class="spinner"></div>
  <p>{{ isGenerating ? '⏳ Génération des questions...' : 'Loading...' }}</p>
</div>

<!-- Error -->
<div class="form-error-banner" *ngIf="error">
  <span>⚠️</span> {{ error }}
</div>

<!-- Form Card -->
<div class="form-container" *ngIf="!loading">
  <div class="form-card">

    <div class="form-card-header">
      <div class="form-title-wrapper">
        <span class="form-badge">{{ isEditMode ? 'Edit' : 'New' }}</span>
        <h2 class="form-title">{{ isEditMode ? 'Edit Test' : 'Add a Test' }}</h2>
      </div>
    </div>

    <div class="form-card-body">
      <form (ngSubmit)="onSubmit()" #testForm="ngForm">

        <!-- Formation ID readonly -->
        <div class="field-group" *ngIf="formationId">
          <label class="field-label">
            <span class="field-icon">📚</span> Linked Formation
          </label>
          <input
            type="text"
            class="field-input"
            [value]="'Formation #' + formationId"
            readonly
            disabled
          />
        </div>

        <!-- Title -->
        <div class="field-group">
          <label for="title" class="field-label">
            <span class="field-icon">📝</span> Title <span class="required">*</span>
          </label>
          <input
            type="text"
            class="field-input"
            id="title"
            name="title"
            placeholder="Test title..."
            [(ngModel)]="test.title"
            required
            #title="ngModel"
            [class.input-error]="title.invalid && title.touched"
          />
          <div class="field-error" *ngIf="title.invalid && title.touched">
            ⚠ Title is required.
          </div>
        </div>

        <!-- Passing Score -->
        <div class="field-group">
          <label for="passingScore" class="field-label">
            <span class="field-icon">⭐</span> Passing Score <span class="required">*</span>
          </label>
          <div class="input-prefix-wrapper">
            <span class="input-prefix">%</span>
            <input
              type="number"
              class="field-input with-prefix"
              id="passingScore"
              name="passingScore"
              placeholder="Ex: 60"
              [(ngModel)]="test.passingScore"
              required
              min="1"
              max="100"
              #passingScore="ngModel"
              [class.input-error]="passingScore.invalid && passingScore.touched"
            />
          </div>
          <div class="field-error" *ngIf="passingScore.invalid && passingScore.touched">
            ⚠ Passing score is required (min. 1).
          </div>
        </div>

        <!-- ✅ Section CSV - seulement en mode création -->
        <div class="field-group ai-section" *ngIf="!isEditMode">
          <label class="field-label">
            <span class="field-icon">📊</span> Number of Questions
          </label>
          <div class="input-prefix-wrapper">
            <span class="input-prefix">Q</span>
            <input
              type="number"
              class="field-input with-prefix"
              name="numberOfQuestions"
              placeholder="Number of questions (ex: 5)"
              [(ngModel)]="numberOfQuestions"
              min="1"
              max="50"
            />
          </div>
          <p style="font-size: 12px; color: #888; margin-top: 8px;">
            📌 Questions will be randomly selected from our database.
          </p>
        </div>

        <!-- Hidden formation -->
        <input type="hidden" name="formation" [ngModel]="formationId" />

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" (click)="cancel()">← Cancel</button>

          <!-- Bouton Update (edit mode) -->
          <button
            type="submit"
            class="btn btn-submit"
            [disabled]="testForm.invalid || isGenerating"
            *ngIf="isEditMode"
          >
            ✏️ Update
          </button>

          <!-- ✅ Bouton Generate from CSV (create mode) -->
          <button
            type="button"
            class="btn btn-ai"
            [disabled]="testForm.invalid || isGenerating"
            (click)="generateFromCSV()"
            *ngIf="!isEditMode"
          >
            {{ isGenerating ? '⏳ Generating...' : '📊 Create Test' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
