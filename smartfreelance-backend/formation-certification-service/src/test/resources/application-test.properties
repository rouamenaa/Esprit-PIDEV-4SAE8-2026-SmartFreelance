# Nom du microservice (optionnel)
spring.application.name=formation-service-test

# Port diffÈrent (Èvite conflit)
server.port=0

# Base de donnÈes TEST
spring.datasource.url=jdbc:mysql://localhost:3306/pi_test
spring.datasource.username=root
spring.datasource.password=

# Hibernate (IMPORTANT)
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DÈsactiver Eureka (TR»S IMPORTANT pour les tests)
eureka.client.enabled=false