apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: application-contract-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: application-contract-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: application-contract-service
  labels:
    app: application-contract-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: application-contract-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
