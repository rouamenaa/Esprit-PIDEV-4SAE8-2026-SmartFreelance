apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: application-contract-service
  labels:
    app: application-contract-service
spec:
  selector:
    matchLabels:
      app: application-contract-service
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: application-contract-service
  labels:
    app: application-contract-service
spec:
  selector:
    matchLabels:
      app: application-contract-service
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
