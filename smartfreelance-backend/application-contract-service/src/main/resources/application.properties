# Server (use 8083 if 8081 is in use; Eureka will register this port)
server.port=8083

# Application name
spring.application.name=microservice-condidature

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/condidature_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Project service (for setting project IN_PROGRESS when a candidature is accepted)
project.service.base-url=http://localhost:8082

# Actuator + Prometheus metrics
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true

# Local default: no Redis/Rabbit wiring (enable in profile "k8s" or via env)
spring.cache.type=none
spring.rabbitmq.enabled=false

# Tracing: export only when Zipkin/Jaeger endpoint is set (see application-k8s.properties)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://jaeger-collector.monitoring.svc.cluster.local:9411/api/v2/spans}

