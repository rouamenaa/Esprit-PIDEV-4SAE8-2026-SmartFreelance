apiVersion: v1
kind: Secret
metadata:
  name: smartfreelance-mysql-secret
  labels:
    app: smartfreelance
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root
  SPRING_DATASOURCE_PASSWORD: root
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smartfreelance-mysql-pvc
  labels:
    app: smartfreelance-mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: smartfreelance-mysql
  labels:
    app: smartfreelance-mysql
spec:
  type: ClusterIP
  selector:
    app: smartfreelance-mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartfreelance-mysql
  labels:
    app: smartfreelance-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartfreelance-mysql
  template:
    metadata:
      labels:
        app: smartfreelance-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              value: pi_db
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartfreelance-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: smartfreelance-mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartfreelance-deployment
  labels:
    app: smartfreelance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartfreelance
  template:
    metadata:
      labels:
        app: smartfreelance
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z smartfreelance-mysql 3306; do sleep 2; done
      containers:
        - name: smartfreelance
          image: nassimrafrafi/smartfreelance:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_APPLICATION_NAME
              value: freelancer-service
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://smartfreelance-mysql:3306/pi_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartfreelance-mysql-secret
                  key: SPRING_DATASOURCE_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: org.hibernate.dialect.MySQL8Dialect
            - name: SPRING_SQL_INIT_MODE
              value: always
            - name: SPRING_JPA_SHOW_SQL
              value: "false"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
