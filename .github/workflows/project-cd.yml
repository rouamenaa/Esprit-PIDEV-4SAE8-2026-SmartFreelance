name: Project Service CD

on:
  workflow_run:
    workflows: [ "Project Service CI" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Linux, X64]
    concurrency:
      group: project-service-cd-main
      cancel-in-progress: true
    env:
      IMAGE_NAME: rouamenaa452/smartfreelance-project-service
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
      NAMESPACE: smartfreelance
      DEPLOYMENT_NAME: project-service
      CONTAINER_NAME: project-service

    steps:
      - name: Checkout code (without external action)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SRC_DIR="$RUNNER_TEMP/project-cd-src"
          rm -rf "$SRC_DIR"
          mkdir -p "$SRC_DIR"
          cd "$SRC_DIR"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.event.workflow_run.head_sha }}"
          git checkout FETCH_HEAD
          echo "SRC_DIR=$SRC_DIR" >> "$GITHUB_ENV"

      - name: Login DockerHub (without external action)
        run: |
          set -e
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build & Push Project Service (without external action)
        run: |
          set -e
          cd "$SRC_DIR"
          docker build \
            -t "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -t "${{ env.IMAGE_NAME }}:latest" \
            smartfreelance-backend/project-service
          docker push "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker push "${{ env.IMAGE_NAME }}:latest"

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy Project Service
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
