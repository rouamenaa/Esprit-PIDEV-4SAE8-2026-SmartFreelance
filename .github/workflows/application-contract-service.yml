name: application-contract-service CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "smartfreelance-backend/application-contract-service/**"
      - ".github/workflows/application-contract-service.yml"
      - ".github/workflows/application-contract-service-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "smartfreelance-backend/application-contract-service/**"
      - ".github/workflows/application-contract-service.yml"

permissions:
  contents: read

concurrency:
  group: application-contract-service-ci-${{ github.ref }}
  cancel-in-progress: true
      
env:
  SERVICE_DIR: smartfreelance-backend/application-contract-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.SERVICE_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn -B clean test

      - name: Build JAR
        run: mvn -B -DskipTests package

