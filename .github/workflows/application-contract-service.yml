name: application-contract-service CI

on:
  push:
    branches: ["main"]
    paths:
      - "smartfreelance-backend/application-contract-service/**"
      - ".github/workflows/application-contract-service.yml"
      - ".github/workflows/application-contract-service-cd.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "smartfreelance-backend/application-contract-service/**"
      - ".github/workflows/application-contract-service.yml"

env:
  SERVICE_DIR: smartfreelance-backend/application-contract-service

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        working-directory: ${{ env.SERVICE_DIR }}
        run: mvn -B clean test

      - name: Build JAR
        working-directory: ${{ env.SERVICE_DIR }}
        run: mvn -B -DskipTests package

