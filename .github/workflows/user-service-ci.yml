pipeline {
  agent any

  stages {
    stage("Checkout") {
      steps {
        checkout scm
      }
    }

    stage("Build & Test (Java 17)") {
      steps {
        sh """
          docker run --rm \
            -u \$(id -u):\$(id -g) \
            -v "\$PWD:/workspace" \
            -v "\$HOME/.m2:/var/maven/.m2" \
            -e MAVEN_CONFIG=/var/maven/.m2 \
            -w /workspace/smartfreelance-backend/user-service \
            maven:3.9.9-eclipse-temurin-17 \
            sh -lc 'java -version && mvn -version && mvn -B clean verify'
        """
      }
    }

    stage("Archive JaCoCo") {
      steps {
        archiveArtifacts artifacts: "smartfreelance-backend/user-service/target/site/jacoco/**", fingerprint: true, allowEmptyArchive: true
      }
    }
  }
}
