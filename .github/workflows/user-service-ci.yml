name: User Service CI

on:
  push:
    paths:
      - "smartfreelance-backend/user-service/**"
      - ".github/workflows/user-service-ci.yml"
  pull_request:
    paths:
      - "smartfreelance-backend/user-service/**"
      - ".github/workflows/user-service-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smartfreelance-backend/user-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run unit tests and build
        run: mvn -B clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jacoco-report
          path: smartfreelance-backend/user-service/target/site/jacoco/**
