pipeline {
  agent any

  environment {
    IMAGE_NAME = "your-dockerhub-username/user-service"
    IMAGE_TAG = "${env.BUILD_NUMBER}"
    JAVA_HOME = "/usr/lib/jvm/java-17-openjdk-amd64"
    PATH = "${JAVA_HOME}/bin:${env.PATH}"
  }

  stages {
    stage("Checkout") {
      steps {
        checkout scm
      }
    }

    stage("Build & Test (Java 17)") {
      steps {
        dir("smartfreelance-backend/user-service") {
          sh '''
            set -e
            echo "Using JAVA_HOME=$JAVA_HOME"
            java -version
            mvn -version

            mvn -B clean verify
          '''
        }
      }
    }

    stage("Build Docker Image") {
      steps {
        dir("smartfreelance-backend/user-service") {
          sh "docker build -t ${IMAGE_NAME}:${IMAGE_TAG} -t ${IMAGE_NAME}:latest ."
        }
      }
    }

    stage("Push Docker Image") {
      steps {
        withCredentials([usernamePassword(
          credentialsId: "dockerhub-creds",
          usernameVariable: "DOCKER_USER",
          passwordVariable: "DOCKER_PASS"
        )]) {
          sh '''
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin
            docker push ${IMAGE_NAME}:${IMAGE_TAG}
            docker push ${IMAGE_NAME}:latest
          '''
        }
      }
    }

    stage("Deploy to Kubernetes") {
      steps {
        sh '''
          kubectl apply -f smartfreelance-backend/user-service/devops/k8s/namespace.yml
          kubectl apply -f smartfreelance-backend/user-service/devops/k8s/user-service-deployment.yml
          kubectl apply -f smartfreelance-backend/user-service/devops/k8s/user-service-service.yml
        '''
      }
    }
  }
}