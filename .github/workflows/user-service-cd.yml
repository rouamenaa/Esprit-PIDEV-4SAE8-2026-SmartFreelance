pipeline {
  agent any

  environment {
    IMAGE_NAME = "your-dockerhub-username/user-service"
    IMAGE_TAG = "${env.BUILD_NUMBER}"
  }

  stages {
    stage("Checkout") {
      steps {
        checkout scm
      }
    }

    stage("Build & Test") {
      steps {
        dir("smartfreelance-backend/user-service") {
          sh "mvn -B clean verify"
        }
      }
    }

    stage("Build Docker Image") {
      steps {
        dir("smartfreelance-backend/user-service") {
          sh "docker build -t ${IMAGE_NAME}:${IMAGE_TAG} -t ${IMAGE_NAME}:latest ."
        }
      }
    }

    stage("Push Docker Image") {
      steps {
        withCredentials([usernamePassword(credentialsId: "dockerhub-creds", usernameVariable: "DOCKER_USER", passwordVariable: "DOCKER_PASS")]) {
          sh "echo ${DOCKER_PASS} | docker login -u ${DOCKER_USER} --password-stdin"
          sh "docker push ${IMAGE_NAME}:${IMAGE_TAG}"
          sh "docker push ${IMAGE_NAME}:latest"
        }
      }
    }

    stage("Deploy to Kubernetes") {
      steps {
        sh "kubectl apply -f smartfreelance-backend/user-service/devops/k8s/namespace.yml"
        sh "kubectl apply -f smartfreelance-backend/user-service/devops/k8s/user-service-deployment.yml"
        sh "kubectl apply -f smartfreelance-backend/user-service/devops/k8s/user-service-service.yml"
      }
    }
  }
}
name: User Service CD

on:
  push:
    branches:
      - salim
    paths:
      - "smartfreelance-backend/user-service/**"
      - ".github/workflows/user-service-cd.yml"
      - "devops/k8s/**"
  workflow_dispatch:

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: smartfreelance-backend/user-service

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build application package and tests
        run: mvn -B clean verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v6
        with:
          context: smartfreelance-backend/user-service
          file: smartfreelance-backend/user-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}

      - name: Skip Docker push when secrets missing
        if: ${{ secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == '' }}
        run: echo "Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets to push image."

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/salim'
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure kubeconfig from secret
        if: ${{ secrets.KUBE_CONFIG_B64 != '' }}
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > ~/.kube/config

      - name: Deploy to Kubernetes
        if: ${{ secrets.KUBE_CONFIG_B64 != '' && secrets.DOCKERHUB_USERNAME != '' }}
        run: |
          sed -i "s|your-dockerhub-username/user-service:latest|${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest|g" devops/k8s/user-service-deployment.yml
          kubectl apply -f devops/k8s/namespace.yml
          kubectl apply -f devops/k8s/user-service-deployment.yml
          kubectl apply -f devops/k8s/user-service-service.yml

      - name: Skip deploy when secrets missing
        if: ${{ secrets.KUBE_CONFIG_B64 == '' || secrets.DOCKERHUB_USERNAME == '' }}
        run: echo "Set KUBE_CONFIG_B64 and DOCKERHUB_USERNAME secrets to enable Kubernetes deploy."
